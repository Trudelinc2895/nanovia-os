# KT Monetization OS — Production Stack
# Usage: docker compose -f infra/docker-compose.prod.yml up -d
version: "3.9"

services:

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "8020:8020"   # admin panel (HTTP fallback)
      - "9091:9091"   # grafana  (HTTP fallback)
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [web, admin, api]
    networks: [kt-net]

  web:
    build: {context: .., dockerfile: infra/docker/web.Dockerfile}
    restart: unless-stopped
    expose: ["3000"]
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks: [kt-net]

  admin:
    build: {context: .., dockerfile: infra/docker/admin.Dockerfile}
    restart: unless-stopped
    expose: ["3020"]
    environment:
      NODE_ENV: production
      PORT: 3020
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks: [kt-net]

  api:
    build: {context: .., dockerfile: infra/docker/api.Dockerfile}
    restart: unless-stopped
    expose: ["8010"]
    env_file: ../.env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8010"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
    networks: [kt-net]

  ai-orchestrator:
    build: {context: .., dockerfile: infra/docker/orchestrator.Dockerfile}
    restart: unless-stopped
    expose: ["8020"]
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
    networks: [kt-net]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose: ["5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kt-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose: ["6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
    networks: [kt-net]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    expose: ["9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [kt-net]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    expose: ["3030"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitor.${DOMAIN}
    volumes: [grafana_data:/var/lib/grafana]
    networks: [kt-net]

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  grafana_data:

networks:
  kt-net:
    driver: bridge
