# Nanovia OS — Production Stack
# Usage: docker compose -f infra/docker-compose.prod.yml up -d
services:

  # ── REVERSE PROXY ──────────────────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      # CADDYFILE defaults to Caddyfile (HTTPS+domain).
      # Set CADDYFILE=./docker/Caddyfile.ip in .env for IP-only / no domain.
      - ${CADDYFILE:-./docker/Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Host mount so fail2ban on the VPS can read Caddy access logs
      - /var/log/caddy:/var/log/caddy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
      PUBLIC_IP: ${PUBLIC_IP:-127.0.0.1}
      # Restrict private admin surfaces to this IP (CIDR). Default = localhost only.
      ADMIN_ALLOWED_IP: ${ADMIN_ALLOWED_IP:-127.0.0.1/32}
    depends_on: [api]
    networks: [nanovia-net]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── FRONTEND ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        BACKEND_INTERNAL_URL: http://api:8010
        API_BASE_URL: http://api:8010
    restart: unless-stopped
    expose: ["3000"]
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      BACKEND_INTERNAL_URL: http://api:8010
      API_BASE_URL: http://api:8010
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [nanovia-net]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    tmpfs: ["/tmp"]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # Optional operational stub. The main admin/operator UI currently lives
  # inside frontend/client/app/admin and ships with the main web app.
  admin:
    build: {context: .., dockerfile: infra/docker/admin.Dockerfile}
    restart: unless-stopped
    expose: ["3020"]
    environment:
      NODE_ENV: production
      PORT: 3020
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3020').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [nanovia-net]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    tmpfs: ["/tmp"]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── BACKEND ────────────────────────────────────────────────────────────────
  api:
    build: {context: .., dockerfile: infra/docker/api.Dockerfile}
    restart: unless-stopped
    expose: ["8010"]
    env_file: ${APP_RUNTIME_ENV_FILE:-../.env}
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8010"
      AI_STATE_DIR: /var/lib/nanovia-ai
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Explicit URL with password — overrides env_file value
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8010/health').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on: [postgres, redis]
    networks: [nanovia-net]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    tmpfs: ["/tmp"]
    volumes:
      - ai_state:/var/lib/nanovia-ai
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "5"}

  scraper-worker:
    build: {context: .., dockerfile: infra/docker/api.Dockerfile}
    restart: unless-stopped
    env_file: ${APP_RUNTIME_ENV_FILE:-../.env}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SCRAPING_RUN_WORKER_IN_API: "false"
    command: ["python", "-m", "api.scraping.worker"]
    depends_on: [redis]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f api.scraping.worker >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [nanovia-net]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    tmpfs: ["/tmp"]
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "5"}

  ai-orchestrator:
    build: {context: .., dockerfile: infra/docker/orchestrator.Dockerfile}
    restart: unless-stopped
    expose: ["8020"]
    env_file: ${APP_RUNTIME_ENV_FILE:-../.env}
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [redis]
    networks: [nanovia-net]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    tmpfs: ["/tmp"]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── DATABASES ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose: ["5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [nanovia-net]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose: ["6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [nanovia-net]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── MONITORING ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    expose: ["9090"]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on: [node-exporter, postgres-exporter, redis-exporter]
    networks: [nanovia-net]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    expose: ["9093"]
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    networks: [nanovia-net]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    expose: ["3030"]
    environment:
      GF_SERVER_HTTP_PORT: "3030"
      GF_SERVER_ROOT_URL: https://monitor.${DOMAIN}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on: [prometheus]
    networks: [nanovia-net]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  node-exporter:
    image: prom/node-exporter:v1.7.0
    restart: unless-stopped
    expose: ["9100"]
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks: [nanovia-net]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    expose: ["9187"]
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on: [postgres]
    networks: [nanovia-net]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    restart: unless-stopped
    expose: ["9121"]
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on: [redis]
    networks: [nanovia-net]
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  ai_state:
  grafana_data:
  prometheus_data:
  alertmanager_data:

networks:
  nanovia-net:
    driver: bridge
