groups:
  - name: kt_infrastructure
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Instance {{ $labels.instance }} of job {{ $labels.job }} has been unreachable for 2 minutes."

      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% for 5 minutes (current: {{ $value | humanize }}%)"

      - alert: CriticalCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL CPU on {{ $labels.instance }}"
          description: "CPU usage above 95% — server potentially overloaded ({{ $value | humanize }}%)"

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High RAM usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanize }}% — may cause OOM"

      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.instance }}"
          description: "Disk / is {{ $value | humanize }}% full"

      - alert: CriticalDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL disk space on {{ $labels.instance }}"
          description: "Disk / is {{ $value | humanize }}% full — immediate action required"

  - name: nanovia_api
    interval: 30s
    rules:
      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="nanovia-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 2s"
          description: "95th percentile latency: {{ $value | humanize }}s"

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{job="nanovia-api",status=~"5.."}[5m]) / rate(http_requests_total{job="nanovia-api"}[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "API error rate > 5%"
          description: "Error rate: {{ $value | humanizePercentage }}"

      - alert: ScrapeWorkerUnavailable
        expr: scrape_worker_active < 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No active scrape worker heartbeat"
          description: "The API metrics endpoint does not see any active scrape worker heartbeat for 5 minutes."

      - alert: ScrapeRetryRateHigh
        expr: sum(rate(scrape_retries_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Scrape retry rate is elevated"
          description: "Scrape retries are occurring at more than 1 retry/sec over the last 10 minutes."

      - alert: ScrapeCacheHitRatioLow
        expr: |
          (
            sum(rate(scrape_cache_requests_total{result="hit"}[15m]))
            /
            clamp_min(sum(rate(scrape_cache_requests_total{result=~"hit|miss"}[15m])), 1)
          ) < 0.20
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Scrape cache hit ratio is low"
          description: "Scrape cache hit ratio stayed below 20% for the last 15 minutes."

  - name: kt_database
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is DOWN"
          description: "Cannot connect to postgres exporter"

      - alert: PostgresHighConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connections"
          description: "{{ $value }} active connections (limit ~100)"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is DOWN"
          description: "Redis exporter cannot connect to Redis"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory > 85%"
          description: "Redis using {{ $value | humanizePercentage }} of max memory"

  - name: kt_security
    interval: 60s
    rules:
      - alert: HighSSHAttempts
        expr: increase(fail2ban_banned_total[1h]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of SSH bans ({{ $value }}/h)"
          description: "fail2ban is banning many IPs — possible brute force attack"

      - alert: CaddyDown
        expr: up{job="caddy"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Caddy (reverse proxy) is DOWN"
          description: "All public endpoints are unreachable"
