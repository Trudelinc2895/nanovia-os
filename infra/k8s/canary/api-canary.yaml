apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanovia-api-canary
  namespace: nanovia
  labels:
    app.kubernetes.io/name: nanovia-api-canary
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanovia-api
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nanovia-api
        track: canary
        app.kubernetes.io/name: nanovia-api
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: ghcr.io/trudelinc2895/nanovia-os/api:latest
          ports:
            - containerPort: 8010
              name: http
          envFrom:
            - configMapRef:
                name: nanovia-config
            - secretRef:
                name: nanovia-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

