apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanovia-worker
  namespace: nanovia
  labels:
    app.kubernetes.io/name: nanovia-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: nanovia-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nanovia-worker
        app.kubernetes.io/name: nanovia-worker
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          image: ghcr.io/trudelinc2895/nanovia-os/api:latest
          command: ["python", "-m", "api.scraping.worker"]
          env:
            - name: SCRAPING_RUN_WORKER_IN_API
              value: "false"
            - name: SCRAPING_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: nanovia-config
            - secretRef:
                name: nanovia-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "api.scraping.worker"]
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "api.scraping.worker"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["pgrep", "-f", "worker.py"]
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

