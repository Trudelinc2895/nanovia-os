apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nanovia-worker-hpa
  namespace: nanovia
  labels:
    app.kubernetes.io/name: nanovia-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/managed-by: kustomize
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nanovia-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
