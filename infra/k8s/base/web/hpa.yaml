apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nanovia-web-hpa
  namespace: nanovia
  labels:
    app.kubernetes.io/name: nanovia-web
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kustomize
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nanovia-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
