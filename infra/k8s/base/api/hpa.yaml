apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nanovia-api-hpa
  namespace: nanovia
  labels:
    app.kubernetes.io/name: nanovia-api
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kustomize
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nanovia-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
