---
# NetworkPolicy: allow ingress to nanovia-api from nginx ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nanovia-api-netpol
  namespace: nanovia
  labels:
    app.kubernetes.io/name: nanovia-api
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: nanovia-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
---
# NetworkPolicy: allow egress from nanovia-worker to postgres, redis, external HTTP
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nanovia-worker-netpol
  namespace: nanovia
  labels:
    app.kubernetes.io/name: nanovia-worker
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: nanovia-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
