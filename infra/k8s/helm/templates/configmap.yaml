apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nanovia.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nanovia.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  APP_ENV: {{ .Values.api.env.APP_ENV | quote }}
  APP_NAME: "Nanovia OS"
  APP_REGION: {{ .Values.global.namespace | default "eu-west-1" | quote }}
  API_HOST: {{ .Values.api.env.API_HOST | quote }}
  API_PORT: {{ .Values.api.env.API_PORT | quote }}
  LOG_LEVEL: {{ .Values.api.env.LOG_LEVEL | quote }}
  REDIS_URL: "redis://redis:6379/0"
  SCRAPING_ENABLED: "false"
  SCRAPING_STEALTH_MODE: "false"
  CHAOS_ENABLED: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
