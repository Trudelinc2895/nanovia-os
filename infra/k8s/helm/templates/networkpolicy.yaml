apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nanovia.fullname" . }}-api-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nanovia.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: {{ include "nanovia.fullname" . }}-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "nanovia.fullname" . }}-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "nanovia.fullname" . }}-redis
      ports:
        - port: 6379
          protocol: TCP
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
