name: CI — Backend & Frontend

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

# Required to publish Trivy SARIF results to GitHub Code Scanning.
# Keep every other workflow permission read-only by default.
permissions:
  contents: read
  security-events: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kttest
          POSTGRES_USER: ktuser
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]

      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: cd backend && pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://ktuser:testpass@localhost:5432/kttest
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: testsecretkeyminimum32characters
          SECRET_KEY: testsecretkey
          JWT_ALGORITHM: HS256
          STRIPE_SECRET_KEY: stripe_secret_fake
          STRIPE_WEBHOOK_SECRET: stripe_webhook_fake
          APP_ENV: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/client/package-lock.json

      - name: Install frontend deps
        working-directory: frontend/client
        run: npm ci

      - name: Build frontend
        working-directory: frontend/client
        run: npm run build

  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: nanovia-api:ci
          load: true

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nanovia-api:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: secrets-check
        run: |
          if [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] && [ -n "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Staging deploy skipped — configure VPS_HOST, SSH_PRIVATE_KEY and DEPLOY_PATH"
          fi

      - name: Setup SSH agent
        if: steps.secrets-check.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        if: steps.secrets-check.outputs.configured == 'true'
        run: ssh-keyscan -T 30 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy staging
        if: steps.secrets-check.outputs.configured == 'true'
        run: |
          ssh -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=60 \
              "deploy@${{ secrets.VPS_HOST }}" \
              "TARGET_ENV=staging TARGET_REF=main DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' \
               REPO_URL='https://github.com/${{ github.repository }}.git' \
               timeout 900 bash -seuo pipefail" <<'ENDSSH'
            cd "${DEPLOY_PATH}"
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main
            docker compose -p nanovia-staging \
              -f infra/docker-compose.prod.yml \
              -f infra/docker-compose.staging.yml \
              --env-file .env.staging \
              up -d --build --force-recreate api ai-orchestrator
            echo "✅ staging deploy $(git rev-parse --short HEAD) successful"
          ENDSSH
