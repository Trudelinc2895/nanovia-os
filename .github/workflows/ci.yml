name: CI — Backend & Frontend

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kttest
          POSTGRES_USER: ktuser
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]

      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: cd backend && pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://ktuser:testpass@localhost:5432/kttest
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: testsecretkeyminimum32characters
          SECRET_KEY: testsecretkey
          JWT_ALGORITHM: HS256
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
          APP_ENV: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/client/package-lock.json

      - name: Install frontend deps
        working-directory: frontend/client
        run: npm ci

      - name: Build frontend
        working-directory: frontend/client
        run: npm run build
