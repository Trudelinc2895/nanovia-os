name: CI — Backend & Frontend

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  preflight-config:
    name: Preflight config gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate env templates
        run: |
          python scripts/validate_runtime_env.py --env-file .env.example --target-env development --allow-placeholders
          python scripts/validate_runtime_env.py --env-file infra/env/.env.staging.example --target-env staging --allow-placeholders
          python scripts/validate_runtime_env.py --env-file infra/env/.env.example --target-env production --allow-placeholders

      - name: Check monitoring config
        run: python scripts/check_monitoring_config.py

      - name: Enforce secret policy
        run: python scripts/check_secret_policy.py

      - name: Run production go-live gate
        run: python scripts/preflight_prod_check.py --env-file infra/env/.env.example --allow-placeholders

  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nanovia_test
          POSTGRES_USER: nanovia_ci
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]

      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://nanovia_ci:testpass@localhost:5432/nanovia_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: testsecretkeyminimum32characters
          SECRET_KEY: testsecretkey
          JWT_ALGORITHM: HS256
          STRIPE_SECRET_KEY: stripe_secret_fake
          STRIPE_WEBHOOK_SECRET: stripe_webhook_fake
          APP_ENV: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  security-ci:
    name: AI security contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run targeted AI security tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          JWT_SECRET_KEY: testsecretkeyminimum32characters
          SECRET_KEY: testsecretkeyminimum32characters
          JWT_ALGORITHM: HS256
        run: |
          cd backend
          python -m pytest \
            tests/test_tenant_ai_isolation.py \
            tests/test_master_ai_access.py \
            tests/test_ai_usage_meter.py \
            tests/test_ai_credit_billing.py \
            tests/test_shared_learning_anonymization.py \
            tests/test_ai_model_policy.py \
            -q

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/client/package-lock.json

      - name: Install frontend deps
        working-directory: frontend/client
        run: npm ci

      - name: Audit frontend lockfile
        working-directory: frontend/client
        run: npm audit --package-lock-only --audit-level=high

      - name: Build frontend
        working-directory: frontend/client
        run: npm run build

  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [preflight-config, backend-tests, security-ci, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: nanovia-api:ci
          load: true

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nanovia-api:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    env:
      VPS_HOST: ${{ vars.VPS_HOST }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      VPS_USER: ${{ vars.VPS_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: secrets-check
        run: |
          if [ -n "${{ vars.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ] && [ -n "${{ vars.DEPLOY_PATH }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Staging deploy skipped — configure VPS_HOST, VPS_SSH_PRIVATE_KEY and DEPLOY_PATH"
          fi

      - name: Setup SSH agent
        if: steps.secrets-check.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          VPS_PORT: ${{ vars.VPS_PORT }}
        run: |
          PORT="${VPS_PORT:-22}"
          ssh-keyscan -T 30 -p "${PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy staging
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          PORT="${VPS_PORT:-22}"
          SSH_USER="${VPS_USER:-deploy}"
          ssh -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=60 \
              -p "${PORT}" \
              "${SSH_USER}@${VPS_HOST}" \
              "TARGET_ENV=staging TARGET_REF=main DEPLOY_PATH='${DEPLOY_PATH}' \
               REPO_URL='https://github.com/${{ github.repository }}.git' \
               timeout 900 bash -seuo pipefail" <<'ENDSSH'
            cd "${DEPLOY_PATH}"
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main
            docker compose -p nanovia-staging \
              -f infra/docker-compose.prod.yml \
              -f infra/docker-compose.staging.yml \
              --env-file .env.staging \
              up -d --build --force-recreate api ai-orchestrator
            echo "✅ staging deploy $(git rev-parse --short HEAD) successful"
          ENDSSH
