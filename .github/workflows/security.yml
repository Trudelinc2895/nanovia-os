name: 🔐 Security — Full Scan

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 3 * * *'  # Daily 3h UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── 1. Secret detection ─────────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Detection (Gitleaks + TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — scan all commits
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog — verified secrets only
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          path: ./
          extra_args: --only-verified

  # ── 2. SAST Python ─────────────────────────────────────────────────────────
  sast-python:
    name: 🐍 SAST — Bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install bandit pip-audit==2.10.0

      - name: Bandit SAST (HIGH severity = fail)
        run: |
          bandit -r backend/ \
            -x backend/tests/ \
            --severity-level high \
            --confidence-level medium \
            -f json -o bandit-report.json
          bandit -r backend/ \
            -x backend/tests/ \
            --severity-level high \
            --confidence-level medium

      - name: pip-audit CVE scan (report — non-blocking)
        continue-on-error: true
        run: |
          python -m pip_audit -r backend/requirements.txt \
            --format json -o pip-audit-report.json || true
          python -m pip_audit -r backend/requirements.txt \
            --vulnerability-service osv

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  # ── 3. CodeQL ──────────────────────────────────────────────────────────────
  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ── 4. Container scan ──────────────────────────────────────────────────────
  trivy:
    name: 🐳 Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── 5. Dependency review (PRs only) ───────────────────────────────────────
  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ── 6. Docker Compose security lint ───────────────────────────────────────
  docker-lint:
    name: 🐳 Docker Security Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Hadolint — Dockerfile best practices
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
          hadolint --failure-threshold error infra/docker/*.Dockerfile

      - name: Install Checkov
        run: pip install checkov==3.2.530

      - name: Checkov — IaC security
        run: |
          checkov -d infra/ \
            --framework dockerfile \
            --soft-fail \
            --output sarif \
            --output-file-path checkov.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('checkov.sarif') != ''
        with:
          sarif_file: checkov.sarif
