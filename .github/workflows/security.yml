name: 🔐 Security — Full Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # Daily 3h UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── 1. Secret detection ─────────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Detection (Gitleaks + TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — scan repository history
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

      - name: TruffleHog — verified secrets only
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --only-verified --no-update

      - name: Secret scan gate
        if: always()
        run: |
          echo "Gitleaks result: ${{ steps.gitleaks.outcome }}"
          echo "TruffleHog result: ${{ steps.trufflehog.outcome }}"
          echo "Secret findings are reported in the job logs, but this workflow remains non-blocking for CI stability."

  # ── 2. SAST Python ─────────────────────────────────────────────────────────
  sast-python:
    name: 🐍 SAST — Bandit + pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: python -m pip install --upgrade pip bandit pip-audit

      - name: Bandit SAST (HIGH severity = fail)
        run: |
          bandit -r backend/ \
            -x backend/tests/ \
            --severity-level high \
            --confidence-level medium \
            -f json -o bandit-report.json
          bandit -r backend/ \
            -x backend/tests/ \
            --severity-level high \
            --confidence-level medium

      - name: pip-audit CVE scan (report — non-blocking)
        continue-on-error: true
        run: |
          pip-audit -r backend/requirements.txt \
            --format json -o pip-audit-report.json || true
          pip-audit -r backend/requirements.txt \
            --vulnerability-service osv || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          if-no-files-found: ignore

  # ── 3. CodeQL ──────────────────────────────────────────────────────────────
  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ── 4. Container scan ──────────────────────────────────────────────────────
  trivy:
    name: 🐳 Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

  # ── 5. Dependency review (PRs only) ───────────────────────────────────────
  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          deny-licenses: GPL-3.0, AGPL-3.0

  # ── 6. Docker Compose security lint ───────────────────────────────────────
  docker-lint:
    name: 🐳 Docker Security Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint — Dockerfile best practices
        continue-on-error: true
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
          hadolint --failure-threshold error infra/docker/*.Dockerfile

      - name: Checkov — IaC security
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: dockerfile
          soft_fail: true
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('checkov.sarif') != ''
        with:
          sarif_file: checkov.sarif
