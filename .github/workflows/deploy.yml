name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: secrets-check
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_KEY" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::Deploy ignoré — Ajouter VPS_HOST + VPS_SSH_PRIVATE_KEY dans Repo Settings → Secrets → Actions"
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Setup SSH agent
        if: steps.secrets-check.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        if: steps.secrets-check.outputs.configured == 'true'
        run: ssh-keyscan -T 30 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=60 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              "deploy@${VPS_HOST}" 'timeout 900 bash -seuo pipefail' <<'ENDSSH'
            cd /opt/kt-monetization-os

            upsert_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '%s=%s\n' "$key" "$value" >> .env
              fi
            }

            # Pull latest code
            git fetch --prune
            git reset --hard origin/main

            # Normalize only public, non-secret routing values on the VPS.
            upsert_env DOMAIN nanovia.ca
            upsert_env PUBLIC_IP 167.114.155.166
            upsert_env API_BASE_URL https://nanovia.ca
            upsert_env NEXT_PUBLIC_API_URL ""
            upsert_env PUBLIC_WEB_URL https://nanovia.ca
            upsert_env PRIVATE_ADMIN_URL https://admin.nanovia.ca
            upsert_env ALLOWED_ORIGINS_RAW "https://nanovia.ca,https://www.nanovia.ca,https://admin.nanovia.ca"

            # Capture current image digests for rollback
            PREV_API=$(docker inspect --format='{{.Id}}' infra-api-1 2>/dev/null || echo "none")

            # Ensure stateful dependencies are available before running migrations
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              up -d postgres redis

            # Build updated app services without starting them yet
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              build api ai-orchestrator web

            # Run migrations before starting the API
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              run --rm -T api python scripts/ensure_alembic_state.py </dev/null
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              run --rm -T api alembic upgrade head </dev/null

            PUBLIC_DOMAIN=$(grep '^DOMAIN=' .env | cut -d= -f2- || true)
            PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-nanovia.ca}

            # Start updated edge + app services after schema is ready
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              up -d --no-deps caddy api ai-orchestrator web

            API_CONTAINER=$(docker compose -f infra/docker-compose.prod.yml --env-file .env ps -q api)

            # Wait for the API container health before probing through the edge.
            for i in $(seq 1 24); do
              API_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "$API_CONTAINER" 2>/dev/null || echo "unknown")
              [ "$API_HEALTH" = "healthy" ] && break

              if [ "$i" -eq 24 ]; then
                echo "❌ API container did not become healthy"
                docker compose -f infra/docker-compose.prod.yml --env-file .env ps
                docker compose -f infra/docker-compose.prod.yml --env-file .env logs --tail=200 api
                exit 1
              fi

              sleep 5
            done

            # Wait for the real public host routing once the API is healthy.
            for i in $(seq 1 12); do
              curl --connect-timeout 3 --max-time 5 -fsS -H "Host: ${PUBLIC_DOMAIN}" http://127.0.0.1/api/v1/health/ready && break

              if [ "$i" -eq 12 ]; then
                echo "❌ Edge healthcheck failed after API became healthy for ${PUBLIC_DOMAIN}"
                docker compose -f infra/docker-compose.prod.yml --env-file .env ps
                docker compose -f infra/docker-compose.prod.yml --env-file .env logs --tail=200 caddy api web
                exit 1
              fi

              sleep 5
            done

            curl --connect-timeout 3 --max-time 5 -fsS -H "Host: ${PUBLIC_DOMAIN}" http://127.0.0.1/api/v1/health/public-entrypoint >/dev/null || {
              echo "❌ public-entrypoint smoke test failed for ${PUBLIC_DOMAIN}"
              docker compose -f infra/docker-compose.prod.yml --env-file .env logs --tail=200 api caddy
              exit 1
            }

            printf 'PUBLIC_DOMAIN=%s\n' "${PUBLIC_DOMAIN}" >&2
            printf 'localhost title: %s\n' "$(curl --connect-timeout 3 --max-time 5 -fsS http://127.0.0.1/login | tr '\n' ' ' | sed -n 's/.*<title>\([^<]*\)<\/title>.*/\1/p')" >&2
            printf 'domain title: %s\n' "$(curl --connect-timeout 3 --max-time 5 -fsS -H "Host: ${PUBLIC_DOMAIN}" http://127.0.0.1/login | tr '\n' ' ' | sed -n 's/.*<title>\([^<]*\)<\/title>.*/\1/p')" >&2
            docker compose -f infra/docker-compose.prod.yml --env-file .env ps >&2
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}' >&2

            echo "✅ Deploy $(git rev-parse --short HEAD) successful"
          ENDSSH
