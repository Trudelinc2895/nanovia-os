name: Deploy — OVH staging/production

on:
  push:
    branches: [staging, main, production-hardening-vps]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Git ref to deploy (branch, tag, or SHA). Leave empty to use the default env branch.
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && (inputs.git_ref != '' && inputs.git_ref || (inputs.environment == 'production' && 'main' || 'staging')) || github.ref_name }}
      REPO_URL: https://github.com/${{ github.repository }}.git
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      PUBLIC_IP: ${{ vars.PUBLIC_IP }}
      STAGING_BIND_ADDRESS: ${{ vars.STAGING_BIND_ADDRESS }}
      STAGING_WEB_PORT: ${{ vars.STAGING_WEB_PORT }}
      STAGING_ADMIN_PORT: ${{ vars.STAGING_ADMIN_PORT }}
      STAGING_API_PORT: ${{ vars.STAGING_API_PORT }}
      STAGING_AI_PORT: ${{ vars.STAGING_AI_PORT }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: secrets-check
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_KEY" ] && [ -n "$DEPLOY_PATH" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy ignoré — configurer VPS_HOST, VPS_SSH_PRIVATE_KEY et DEPLOY_PATH pour l'environnement GitHub ciblé"
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

      - name: Setup SSH agent
        if: steps.secrets-check.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        if: steps.secrets-check.outputs.configured == 'true'
        run: ssh-keyscan -T 30 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=60 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              "deploy@${VPS_HOST}" \
              "TARGET_ENV='${TARGET_ENV}' TARGET_REF='${TARGET_REF}' DEPLOY_PATH='${DEPLOY_PATH}' REPO_URL='${REPO_URL}' APP_DOMAIN='${APP_DOMAIN}' PUBLIC_IP='${PUBLIC_IP}' STAGING_BIND_ADDRESS='${STAGING_BIND_ADDRESS}' STAGING_WEB_PORT='${STAGING_WEB_PORT}' STAGING_ADMIN_PORT='${STAGING_ADMIN_PORT}' STAGING_API_PORT='${STAGING_API_PORT}' STAGING_AI_PORT='${STAGING_AI_PORT}' timeout 900 bash -seuo pipefail" <<'ENDSSH'
            mkdir -p "${DEPLOY_PATH}"
            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              git clone "${REPO_URL}" "${DEPLOY_PATH}"
            fi

            cd "${DEPLOY_PATH}"

            if [ -n "$(git status --porcelain)" ]; then
              echo "❌ Deploy checkout is dirty; refusing to deploy over local changes"
              git status --short
              exit 1
            fi

            upsert_env() {
              file="$1"
              key="$2"
              value="$3"
              if grep -q "^${key}=" "$file" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            generate_hex_secret() {
              openssl rand -hex 32
            }

            generate_password() {
              openssl rand -base64 24 | tr -d '+/=' | head -c 24
            }

            generate_fernet_key() {
              python3 -c "import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
            }

            compose() {
              docker compose -p "${COMPOSE_PROJECT}" "${COMPOSE_FILES[@]}" --env-file "${ENV_FILE}" "$@"
            }

            git fetch --prune origin
            if git show-ref --verify --quiet "refs/heads/${TARGET_REF}"; then
              git checkout "${TARGET_REF}"
            else
              git checkout -b "${TARGET_REF}" "origin/${TARGET_REF}"
            fi
            git pull --ff-only origin "${TARGET_REF}"

            if [ "${TARGET_ENV}" = "production" ]; then
              ENV_FILE=".env"
              if [ -f ".env.production" ]; then
                ENV_FILE=".env.production"
              fi
              COMPOSE_PROJECT="nanovia-prod"
              COMPOSE_FILES=(-f infra/docker-compose.prod.yml)
            else
              ENV_FILE=".env.staging"
              if [ ! -f "${ENV_FILE}" ]; then
                [ -f "infra/env/.env.staging.example" ] || {
                  echo "❌ Missing infra/env/.env.staging.example in the deploy checkout"
                  exit 1
                }
                cp "infra/env/.env.staging.example" "${ENV_FILE}"
                DB_PASSWORD="$(generate_password)"
                REDIS_PASSWORD_VALUE="$(generate_password)"
                JWT_SECRET_VALUE="$(generate_hex_secret)"
                TOTP_KEY_VALUE="$(generate_fernet_key)"
                GRAFANA_PASSWORD_VALUE="$(generate_password)"
                upsert_env "${ENV_FILE}" SECRET_KEY "${JWT_SECRET_VALUE}"
                upsert_env "${ENV_FILE}" JWT_SECRET_KEY "${JWT_SECRET_VALUE}"
                upsert_env "${ENV_FILE}" POSTGRES_PASSWORD "${DB_PASSWORD}"
                upsert_env "${ENV_FILE}" DATABASE_URL "postgresql+psycopg://ktadmin:${DB_PASSWORD}@postgres:5432/ktmonetization"
                upsert_env "${ENV_FILE}" REDIS_PASSWORD "${REDIS_PASSWORD_VALUE}"
                upsert_env "${ENV_FILE}" REDIS_URL "redis://:${REDIS_PASSWORD_VALUE}@redis:6379/0"
                upsert_env "${ENV_FILE}" TOTP_ENCRYPTION_KEY "${TOTP_KEY_VALUE}"
                upsert_env "${ENV_FILE}" GRAFANA_ADMIN_PASSWORD "${GRAFANA_PASSWORD_VALUE}"
                upsert_env "${ENV_FILE}" OPENAI_API_KEY ""
                upsert_env "${ENV_FILE}" RESEND_API_KEY ""
                upsert_env "${ENV_FILE}" STRIPE_SECRET_KEY ""
                upsert_env "${ENV_FILE}" STRIPE_PUBLIC_KEY ""
                upsert_env "${ENV_FILE}" STRIPE_WEBHOOK_SECRET ""
                upsert_env "${ENV_FILE}" STRIPE_PRICE_PRO_MONTHLY_ID ""
                upsert_env "${ENV_FILE}" STRIPE_PRICE_PRO_YEARLY_ID ""
                upsert_env "${ENV_FILE}" STRIPE_PRICE_BUSINESS_MONTHLY_ID ""
                upsert_env "${ENV_FILE}" STRIPE_PRICE_BUSINESS_YEARLY_ID ""
                upsert_env "${ENV_FILE}" STRIPE_CREDIT_PRICE_ID ""
                echo "Bootstrapped ${ENV_FILE} from infra/env/.env.staging.example with generated local staging secrets"
              fi
              COMPOSE_PROJECT="nanovia-staging"
              COMPOSE_FILES=(-f infra/docker-compose.prod.yml -f infra/docker-compose.staging.yml)
            fi

            [ -f "${ENV_FILE}" ] || {
              echo "❌ Missing ${ENV_FILE}"
              exit 1
            }

            DOMAIN_VALUE="${APP_DOMAIN}"
            if [ -z "${DOMAIN_VALUE}" ] && [ "${TARGET_ENV}" = "production" ]; then
              DOMAIN_VALUE="nanovia.ca"
            fi
            DOMAIN_VALUE="${DOMAIN_VALUE#api.}"
            PUBLIC_IP_VALUE="${PUBLIC_IP:-}"

            if [ "${TARGET_ENV}" = "production" ]; then
              upsert_env "${ENV_FILE}" APP_ENV production
              upsert_env "${ENV_FILE}" APP_NAME "Nanovia OS"
              upsert_env "${ENV_FILE}" APP_RUNTIME_ENV_FILE "../${ENV_FILE}"
              if [ -n "${PUBLIC_IP_VALUE}" ]; then
                upsert_env "${ENV_FILE}" PUBLIC_IP "${PUBLIC_IP_VALUE}"
              fi
              if [ -n "${DOMAIN_VALUE}" ]; then
                upsert_env "${ENV_FILE}" DOMAIN "${DOMAIN_VALUE}"
                upsert_env "${ENV_FILE}" API_BASE_URL "https://${DOMAIN_VALUE}"
                upsert_env "${ENV_FILE}" NEXT_PUBLIC_API_URL "https://${DOMAIN_VALUE}"
                upsert_env "${ENV_FILE}" PUBLIC_WEB_URL "https://${DOMAIN_VALUE}"
                upsert_env "${ENV_FILE}" PRIVATE_ADMIN_URL "https://${DOMAIN_VALUE}"
                upsert_env "${ENV_FILE}" ALLOWED_ORIGINS_RAW "https://${DOMAIN_VALUE},https://www.${DOMAIN_VALUE}"
              fi
            else
              STAGING_BIND_ADDRESS="${STAGING_BIND_ADDRESS:-127.0.0.1}"
              STAGING_WEB_PORT="${STAGING_WEB_PORT:-13000}"
              STAGING_ADMIN_PORT="${STAGING_ADMIN_PORT:-13020}"
              STAGING_API_PORT="${STAGING_API_PORT:-18010}"
              STAGING_AI_PORT="${STAGING_AI_PORT:-18020}"

              upsert_env "${ENV_FILE}" APP_ENV staging
              upsert_env "${ENV_FILE}" APP_NAME "Nanovia OS (staging)"
              upsert_env "${ENV_FILE}" APP_RUNTIME_ENV_FILE "../${ENV_FILE}"
              upsert_env "${ENV_FILE}" DOMAIN "${DOMAIN_VALUE:-staging.nanovia.local}"
              if [ -n "${PUBLIC_IP_VALUE}" ]; then
                upsert_env "${ENV_FILE}" PUBLIC_IP "${PUBLIC_IP_VALUE}"
              fi
              upsert_env "${ENV_FILE}" STAGING_BIND_ADDRESS "${STAGING_BIND_ADDRESS}"
              upsert_env "${ENV_FILE}" STAGING_WEB_PORT "${STAGING_WEB_PORT}"
              upsert_env "${ENV_FILE}" STAGING_ADMIN_PORT "${STAGING_ADMIN_PORT}"
              upsert_env "${ENV_FILE}" STAGING_API_PORT "${STAGING_API_PORT}"
              upsert_env "${ENV_FILE}" STAGING_AI_PORT "${STAGING_AI_PORT}"
              upsert_env "${ENV_FILE}" NEXT_PUBLIC_API_URL "http://${STAGING_BIND_ADDRESS}:${STAGING_API_PORT}"
              upsert_env "${ENV_FILE}" API_BASE_URL "http://${STAGING_BIND_ADDRESS}:${STAGING_API_PORT}"
              upsert_env "${ENV_FILE}" PUBLIC_WEB_URL "http://${STAGING_BIND_ADDRESS}:${STAGING_WEB_PORT}"
              upsert_env "${ENV_FILE}" PRIVATE_ADMIN_URL "http://${STAGING_BIND_ADDRESS}:${STAGING_ADMIN_PORT}"
              upsert_env "${ENV_FILE}" ALLOWED_ORIGINS_RAW "http://${STAGING_BIND_ADDRESS}:${STAGING_WEB_PORT},http://${STAGING_BIND_ADDRESS}:${STAGING_ADMIN_PORT}"
              CURRENT_JWT_SECRET=$(grep '^JWT_SECRET_KEY=' "${ENV_FILE}" | cut -d= -f2- || true)
              if [ -z "${CURRENT_JWT_SECRET}" ] || printf '%s' "${CURRENT_JWT_SECRET}" | grep -Eq 'CHANGE_ME|REPLACE_ME|GENERATE_WITH'; then
                CURRENT_JWT_SECRET="$(generate_hex_secret)"
                upsert_env "${ENV_FILE}" JWT_SECRET_KEY "${CURRENT_JWT_SECRET}"
              fi
              upsert_env "${ENV_FILE}" SECRET_KEY "${CURRENT_JWT_SECRET}"
            fi

            STRIPE_SECRET=$(grep '^STRIPE_SECRET_KEY=' "${ENV_FILE}" | cut -d= -f2- || true)
            STRIPE_LIVE_PREFIX='sk'"_live_"
            if [ "${TARGET_ENV}" = "production" ] && ! printf '%s' "${STRIPE_SECRET}" | grep -q "^${STRIPE_LIVE_PREFIX}"; then
              echo "❌ Production deploy requires a live Stripe secret key in ${ENV_FILE}"
              exit 1
            fi
            if [ "${TARGET_ENV}" = "staging" ] && printf '%s' "${STRIPE_SECRET}" | grep -q "^${STRIPE_LIVE_PREFIX}"; then
              echo "❌ Staging deploy refuses live Stripe keys in ${ENV_FILE}"
              exit 1
            fi

            python3 scripts/validate_runtime_env.py --env-file "${ENV_FILE}" --target-env "${TARGET_ENV}"

            EDGE_MODE=domain
            if [ "${TARGET_ENV}" = "production" ]; then
              if [ -z "${DOMAIN_VALUE}" ] || ! getent ahosts "${DOMAIN_VALUE}" >/dev/null 2>&1; then
                EDGE_MODE=ip
                upsert_env "${ENV_FILE}" CADDYFILE ./docker/Caddyfile.ip
              else
                upsert_env "${ENV_FILE}" CADDYFILE ./docker/Caddyfile
              fi
            fi

            PREV_API=$(docker inspect --format='{{.Id}}' "${COMPOSE_PROJECT}-api-1" 2>/dev/null || echo "none")

            compose up -d postgres redis
            POSTGRES_CONTAINER=$(compose ps -q postgres)
            REDIS_CONTAINER=$(compose ps -q redis)
            for i in $(seq 1 24); do
              POSTGRES_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "${POSTGRES_CONTAINER}" 2>/dev/null || echo "unknown")
              REDIS_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "${REDIS_CONTAINER}" 2>/dev/null || echo "unknown")
              if [ "${POSTGRES_HEALTH}" = "healthy" ] && [ "${REDIS_HEALTH}" = "healthy" ]; then
                break
              fi
              if [ "${i}" -eq 24 ]; then
                echo "❌ Postgres/Redis did not become healthy before migrations"
                compose ps
                compose logs --tail=200 postgres redis
                exit 1
              fi
              sleep 5
            done
            if [ "${TARGET_ENV}" = "production" ]; then
              compose build api ai-orchestrator scraper-worker
            else
              compose build api ai-orchestrator scraper-worker web admin
            fi
            compose run --rm -T api python scripts/ensure_alembic_state.py </dev/null
            compose run --rm -T api alembic upgrade head </dev/null

            if [ "${TARGET_ENV}" = "production" ]; then
              compose up -d --force-recreate --no-deps caddy api ai-orchestrator scraper-worker
            else
              compose up -d --force-recreate --no-deps --scale caddy=0 api ai-orchestrator scraper-worker web admin
            fi

            API_CONTAINER=$(compose ps -q api)

            for i in $(seq 1 24); do
              API_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "${API_CONTAINER}" 2>/dev/null || echo "unknown")
              [ "${API_HEALTH}" = "healthy" ] && break

              if [ "${i}" -eq 24 ]; then
                echo "❌ API container did not become healthy"
                compose ps
                compose logs --tail=200 api
                exit 1
              fi

              sleep 5
            done

            if [ "${TARGET_ENV}" = "production" ]; then
              PUBLIC_DOMAIN=$(grep '^DOMAIN=' "${ENV_FILE}" | cut -d= -f2- || true)
              PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-nanovia.ca}
              PUBLIC_HOST="${PUBLIC_DOMAIN}"

              probe_caddy_from_api() {
                local path="$1"
                compose exec -T api python -c "import sys, urllib.request; resp = urllib.request.urlopen('http://caddy${path}', timeout=5); sys.exit(0 if resp.status == 200 else 1)"
              }

              for i in $(seq 1 12); do
                if [ "${EDGE_MODE}" = "ip" ]; then
                  probe_caddy_from_api /health && break
                else
                  curl --connect-timeout 3 --max-time 5 -fsS -H "Host: ${PUBLIC_HOST}" http://127.0.0.1/health && break
                fi

                if [ "${i}" -eq 12 ]; then
                  echo "❌ Edge healthcheck failed after API became healthy for ${PUBLIC_HOST} (mode=${EDGE_MODE})"
                  compose ps
                  compose logs --tail=200 caddy api scraper-worker ai-orchestrator
                  exit 1
                fi

                sleep 5
              done

              if [ "${EDGE_MODE}" = "ip" ]; then
                probe_caddy_from_api /api/v1/billing/plans >/dev/null || {
                  echo "❌ billing plans smoke test failed for raw IP mode"
                  compose logs --tail=200 api caddy
                  exit 1
                }
              else
                curl --connect-timeout 3 --max-time 5 -fsS -H "Host: ${PUBLIC_HOST}" http://127.0.0.1/api/v1/billing/plans >/dev/null || {
                  echo "❌ billing plans smoke test failed for ${PUBLIC_HOST}"
                  compose logs --tail=200 api caddy
                  exit 1
                }
              fi

              printf 'EDGE_MODE=%s\n' "${EDGE_MODE}" >&2
              printf 'PUBLIC_HOST=%s\n' "${PUBLIC_HOST}" >&2
            else
              curl --connect-timeout 3 --max-time 5 -fsS "http://${STAGING_BIND_ADDRESS}:${STAGING_API_PORT}/api/v1/health/ready" >/dev/null || {
                echo "❌ staging API ready probe failed"
                compose logs --tail=200 api
                exit 1
              }
              curl --connect-timeout 3 --max-time 5 -fsS "http://${STAGING_BIND_ADDRESS}:${STAGING_WEB_PORT}/login" | tr '\n' ' ' | sed -n 's/.*<title>\([^<]*\)<\/title>.*/staging title: \1/p' >&2
              printf 'STAGING_TUNNEL=ssh -L %s:127.0.0.1:%s -L %s:127.0.0.1:%s deploy@%s\n' "${STAGING_WEB_PORT}" "${STAGING_WEB_PORT}" "${STAGING_API_PORT}" "${STAGING_API_PORT}" "${VPS_HOST:-${PUBLIC_IP_VALUE}}" >&2
            fi

            printf 'PREV_API=%s\n' "${PREV_API}" >&2
            compose ps >&2
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}' >&2

            echo "✅ ${TARGET_ENV} deploy $(git rev-parse --short HEAD) successful"
          ENDSSH
