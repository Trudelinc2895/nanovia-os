name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: secrets-check
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_KEY" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::Deploy ignoré — Ajouter VPS_HOST + VPS_SSH_PRIVATE_KEY dans Repo Settings → Secrets → Actions"
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        if: steps.secrets-check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/kt-monetization-os

            # Pull latest code
            git fetch --prune
            git reset --hard origin/main

            # Capture current image digests for rollback
            PREV_API=$(docker inspect --format='{{.Id}}' infra-api-1 2>/dev/null || echo "none")

            # Ensure stateful dependencies are available before running migrations
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              up -d postgres redis

            # Build updated app services without starting them yet
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              build api ai-orchestrator web

            # Run migrations before starting the API
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              run --rm api alembic upgrade head

            # Start updated app services after schema is ready
            docker compose -f infra/docker-compose.prod.yml --env-file .env \
              up -d --no-deps api ai-orchestrator web

            API_CONTAINER=$(docker compose -f infra/docker-compose.prod.yml --env-file .env ps -q api)

            # Wait for the API container health before probing through the edge.
            for i in $(seq 1 24); do
              API_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "$API_CONTAINER" 2>/dev/null || echo "unknown")
              [ "$API_HEALTH" = "healthy" ] && break

              if [ "$i" -eq 24 ]; then
                echo "❌ API container did not become healthy"
                docker compose -f infra/docker-compose.prod.yml --env-file .env ps
                docker compose -f infra/docker-compose.prod.yml --env-file .env logs --tail=200 api
                exit 1
              fi

              sleep 5
            done

            # Wait for the reverse proxy path once the API is healthy.
            for i in $(seq 1 12); do
              curl -fsS http://localhost/api/v1/health/ready && break

              if [ "$i" -eq 12 ]; then
                echo "❌ Edge healthcheck failed after API became healthy"
                docker compose -f infra/docker-compose.prod.yml --env-file .env ps
                docker compose -f infra/docker-compose.prod.yml --env-file .env logs --tail=200 caddy api web
                exit 1
              fi

              sleep 5
            done

            curl -fsS http://localhost/api/v1/health/public-entrypoint >/dev/null || {
              echo "❌ public-entrypoint smoke test failed"
              docker compose -f infra/docker-compose.prod.yml --env-file .env logs --tail=200 api caddy
              exit 1
            }

            echo "✅ Deploy $(git rev-parse --short HEAD) successful"
