name: Deploy — Staging & Production

on:
  push:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup DB before deploy (prod only)
        if: github.ref_name == 'main'
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             docker compose exec -T postgres pg_dump -U \$POSTGRES_USER \$POSTGRES_DB \
             > backups/backup-$(date +%Y%m%d-%H%M%S).sql"

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" bash -s << 'ENDSSH'
            set -e
            cd "${DEPLOY_PATH}"
            git pull --ff-only
            docker compose -f infra/docker-compose.prod.yml pull
            docker compose -f infra/docker-compose.prod.yml up -d --remove-orphans
            docker compose -f infra/docker-compose.prod.yml exec -T api python -m alembic upgrade head
          ENDSSH

      - name: Smoke test
        run: |
          sleep 10
          curl -sf "https://api.${{ secrets.DOMAIN }}/health" || exit 1

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          MSG="KT Deploy %5B${GITHUB_REF_NAME}%5D%3A ${STATUS} — ${GITHUB_SHA:0:7}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}"
