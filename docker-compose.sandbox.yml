services:
  postgres:
    image: postgres:16-alpine
    container_name: nanovia-sandbox-postgres
    environment:
      POSTGRES_DB: nanovia_sandbox
      POSTGRES_USER: nanovia
      POSTGRES_PASSWORD: nanovia_password
    ports:
      - "5432:5432"
    volumes:
      - nanovia-sandbox-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nanovia-sandbox-redis
    ports:
      - "6379:6379"
    volumes:
      - nanovia-sandbox-redis:/data

  api:
    image: python:3.11-slim
    container_name: nanovia-sandbox-api
    working_dir: /workspace/backend
    env_file:
      - .env.sandbox
    environment:
      PYTHONPATH: /workspace/backend
    command: >
      sh -lc "pip install --no-cache-dir -r requirements.txt &&
      uvicorn api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/workspace
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    container_name: nanovia-sandbox-web
    working_dir: /workspace/frontend/client
    env_file:
      - .env.sandbox
    command: >
      sh -lc "npm ci &&
      npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./:/workspace
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  nanovia-sandbox-postgres:
  nanovia-sandbox-redis:
